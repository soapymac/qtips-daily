name: Daily Tipster Pipeline

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      race_date:
        description: 'Which day to run for?'
        required: true
        default: 'Tomorrow'
        type: choice
        options:
          - Today
          - Tomorrow
      run_tipster:
        description: 'Run V12 Tipster analysis?'
        required: true
        default: 'Yes'
        type: choice
        options:
          - 'Yes'
          - 'No - just scrape racecards & odds'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/deploy/requirements_pipeline.txt

      - name: Determine target date
        id: date
        run: |
          CHOICE="${{ github.event.inputs.race_date }}"
          if [ "$CHOICE" = "Today" ]; then
            TARGET=$(date +%Y-%m-%d)
          else
            TARGET=$(date -d "tomorrow" +%Y-%m-%d)
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "🏇 Running pipeline for: $TARGET"

      - name: Scrape Racecards
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "📋 Scraping racecards for $TARGET..."
          python scripts/racecards_runner.py $TARGET

      - name: Fetch Betfair Odds
        env:
          BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
          BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "💰 Fetching Betfair odds for $TARGET..."
          python scripts/fetch_betfair_odds.py --date $TARGET || echo "⚠️ Betfair odds unavailable, continuing..."

      - name: Run V12 Tipster
        if: github.event.inputs.run_tipster != 'No - just scrape racecards & odds'
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "🤖 Running V12 Tipster for $TARGET..."
          export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
          python scripts/tipster_v12_premium.py -Date $TARGET

      - name: Commit and Push Results
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          for dir in racecards live_odds docs Grok_V12_Tips; do
            if [ -d "$dir" ]; then
              git add "$dir/" || true
            fi
          done
          
          git diff --staged --quiet || (git commit -m "🏇 Tips for $TARGET" && git push)
          echo "✅ Done! View tips at: https://soapymac.github.io/qtips-daily/docs/tips_mobile_$TARGET.html"
