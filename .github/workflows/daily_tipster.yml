name: Daily Tipster Pipeline

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date to run for (YYYY-MM-DD). Leave blank for tomorrow.'
        required: false
        default: ''
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # Grant permissions needed to push commits back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so push works nicely
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/deploy/requirements_pipeline.txt

      - name: Determine target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            TARGET="${{ github.event.inputs.target_date }}"
            echo "Using manually specified date: $TARGET"
          else
            TARGET=$(date -d "tomorrow" +%Y-%m-%d)
            echo "Using default (tomorrow): $TARGET"
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Run Racecards Scraper
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "Scraping racecards for $TARGET"
          python scripts/racecards_runner.py $TARGET

      - name: Fetch Betfair Odds
        env:
          BETFAIR_USERNAME: ${{ secrets.BETFAIR_USERNAME }}
          BETFAIR_PASSWORD: ${{ secrets.BETFAIR_PASSWORD }}
          BETFAIR_APP_KEY: ${{ secrets.BETFAIR_APP_KEY }}
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "Fetching Betfair odds for $TARGET"
          python scripts/fetch_betfair_odds.py --date $TARGET || echo "Betfair odds fetch failed (non-fatal), continuing without odds..."

      - name: Run Tipster Application
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "Generating Tips for $TARGET"
          
          # Add the scripts directory to PYTHONPATH so utils imports work
          export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
          python scripts/tipster_v12_premium.py -Date $TARGET

      - name: Commit and Push Changes
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          
          # Set git config
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add directories only if they exist
          for dir in racecards live_odds docs Grok_V12_Tips; do
            if [ -d "$dir" ]; then
              git add "$dir/" || true
            fi
          done
          
          # Commit only if there are staged changes
          git diff --staged --quiet || (git commit -m "Auto-update tipster results & HTML for $TARGET" && git push)
