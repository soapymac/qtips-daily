name: Daily Tipster Pipeline

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # Grant permissions needed to push commits back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so push works nicely
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/deploy/requirements_pipeline.txt

      - name: Run Racecards Scraper
        run: |
          # Grabs tomorrow's date dynamically (UTC)
          TOMORROW=$(date -d "tomorrow" +%Y-%m-%d)
          echo "Scraping racecards for $TOMORROW"
          
          # Since the original script might ask for input or use today's date, 
          # we pass the date directly. We will create a small runner script for it.
          python scripts/racecards_runner.py $TOMORROW

      - name: Run Tipster Application
        run: |
          TOMORROW=$(date -d "tomorrow" +%Y-%m-%d)
          echo "Generating Tips for $TOMORROW"
          
          # Add the scripts directory to PYTHONPATH so utils imports work
          export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
          python scripts/tipster_v12_premium.py -Date $TOMORROW

      - name: Commit and Push Changes
        run: |
          # Set git config
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add directories only if they exist
          for dir in racecards live_odds docs Grok_V12_Tips; do
            if [ -d "$dir" ]; then
              git add "$dir/" || true
            fi
          done
          
          # Commit only if there are staged changes
          git diff --staged --quiet || (git commit -m "Auto-update tipster results & HTML for $(date -d 'tomorrow' +%Y-%m-%d)" && git push)
